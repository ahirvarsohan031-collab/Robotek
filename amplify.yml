version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm -v
        - npm cache clean --force
        - npm install --prefer-offline
    build:
      commands:
        # Bridging environment variables from Amplify to Next.js (.env)
        - echo "AUTH_SECRET=$AUTH_SECRET" >> .env
        - echo "AUTH_TRUST_HOST=$AUTH_TRUST_HOST" >> .env
        - echo "NEXTAUTH_URL=$NEXTAUTH_URL" >> .env
        - echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" >> .env
        - echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" >> .env
        - echo "GOOGLE_OAUTH_TOKENS=$GOOGLE_OAUTH_TOKENS" >> .env
        - echo "MAYTAPI_PRODUCT_ID=$MAYTAPI_PRODUCT_ID" >> .env
        - echo "MAYTAPI_TOKEN=$MAYTAPI_TOKEN" >> .env
        - echo "MAYTAPI_PHONE_ID=$MAYTAPI_PHONE_ID" >> .env
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*

